<div class="app-shell">
  <mat-toolbar class="app-toolbar">
    <a routerLink="/cv" class="flex items-center gap-2 no-underline">
      <img src="logo.png" alt="FlexCV" class="app-logo" />
      <span class="font-semibold">FlexCV</span>
    </a>
    <span class="toolbar-spacer"></span>
    <nav class="flex items-center gap-1">
      <a matButton routerLink="/cv" routerLinkActive="toolbar-link-active">
        <mat-icon>description</mat-icon> {{ i18n.t('nav.cv') }}
      </a>
      <a matButton routerLink="/ai" routerLinkActive="toolbar-link-active">
        <mat-icon>forum</mat-icon> {{ i18n.t('nav.chat') }}
      </a>
      <a matButton routerLink="/settings" routerLinkActive="toolbar-link-active">
        <mat-icon>settings</mat-icon> {{ i18n.t('nav.settings') }}
      </a>
    </nav>
  </mat-toolbar>

  <main class="app-content">
    <router-outlet />
  </main>
</div>

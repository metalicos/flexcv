<div class="flex flex-col gap-6">
  <section class="flex flex-col gap-3">
    <h3 class="accent">{{ i18n.t('cv.share.embedTitle') }}</h3>
    <p class="muted">{{ i18n.t('cv.share.desc') }}</p>
    <div class="form-actions">
      <button matButton="filled" (click)="generateEmbed()">
        <mat-icon>link</mat-icon> {{ i18n.t('cv.share.generate') }}
      </button>
    </div>
    @if (embedLink()) {
      <mat-form-field class="form-field-full" appearance="outline">
        <mat-label>{{ i18n.t('cv.share.title') }}</mat-label>
        <input matInput [value]="embedLink()" readonly />
        <button matIconButton matSuffix (click)="copy(embedLink())" [attr.aria-label]="i18n.t('cv.share.copy')">
          <mat-icon>content_copy</mat-icon>
        </button>
      </mat-form-field>
    }
  </section>

  <hr class="divider-line" />

  <section class="flex flex-col gap-3">
    <h3 class="accent">{{ i18n.t('cv.share.urlTitle') }}</h3>
    <p class="field-hint">{{ i18n.t('cv.share.urlHint') }}</p>
    <mat-form-field class="form-field-full" appearance="outline">
      <mat-label>{{ i18n.t('cv.share.urlInput') }}</mat-label>
      <input
        matInput
        [ngModel]="jsonUrl()"
        (ngModelChange)="jsonUrl.set($event)"
        placeholder="https://raw.githubusercontent.com/user/repo/main/resume.json"
      />
    </mat-form-field>
    <div class="form-actions">
      <button matButton="filled" [disabled]="!jsonUrl().trim()" (click)="generateUrl()">
        <mat-icon>link</mat-icon> {{ i18n.t('cv.share.urlGenerate') }}
      </button>
    </div>
    @if (urlLink()) {
      <mat-form-field class="form-field-full" appearance="outline">
        <mat-label>{{ i18n.t('cv.share.title') }}</mat-label>
        <input matInput [value]="urlLink()" readonly />
        <button matIconButton matSuffix (click)="copy(urlLink())" [attr.aria-label]="i18n.t('cv.share.copy')">
          <mat-icon>content_copy</mat-icon>
        </button>
      </mat-form-field>
    }
  </section>
</div>

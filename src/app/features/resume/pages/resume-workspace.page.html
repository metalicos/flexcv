<div class="page-header">
  <h1 class="page-title">{{ i18n.t('cv.title') }}</h1>
  @if (hasResume()) {
    <div class="form-actions">
      <button matButton="filled" (click)="exportPdf()">
        <mat-icon>picture_as_pdf</mat-icon> {{ i18n.t('cv.exportPdf') }}
      </button>
      <button matButton (click)="exportJson()">
        <mat-icon>data_object</mat-icon> {{ i18n.t('cv.exportJson') }}
      </button>
      <button matButton (click)="clear()">
        <mat-icon>delete_outline</mat-icon> {{ i18n.t('cv.clear') }}
      </button>
    </div>
  }
</div>

@if (hasResume()) {
  <mat-expansion-panel class="mb-6">
    <mat-expansion-panel-header>
      <mat-panel-title>{{ i18n.t('cv.importReplace') }}</mat-panel-title>
    </mat-expansion-panel-header>
    <app-import-panel (imported)="onImported($event)" />
  </mat-expansion-panel>

  <app-cv-document #cvDoc [resume]="resume()!" />
} @else {
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ i18n.t('cv.getStarted.title') }}</mat-card-title>
      <mat-card-subtitle>{{ i18n.t('cv.getStarted.subtitle') }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content class="pt-4">
      <app-import-panel (imported)="onImported($event)" />
    </mat-card-content>
  </mat-card>
}

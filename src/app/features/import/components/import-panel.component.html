@if (busy()) {
  <mat-progress-bar mode="indeterminate" />
}

<mat-tab-group>
  <mat-tab label="File">
    <div class="flex flex-col gap-3 p-4">
      <p class="field-hint">Import a JSON or TXT file. PDF/DOCX parsing via Gemini is coming next.</p>
      <div class="form-actions">
        <button matButton="filled" (click)="fileInput.click()" [disabled]="busy()">
          <mat-icon>upload_file</mat-icon> Choose file
        </button>
        <button matButton (click)="loadSample()" [disabled]="busy()">
          <mat-icon>auto_awesome</mat-icon> Load sample
        </button>
      </div>
      <input
        #fileInput
        type="file"
        class="hidden"
        [accept]="accept"
        (change)="onFileSelected($event)"
      />
    </div>
  </mat-tab>

  <mat-tab label="From URL">
    <div class="flex flex-col gap-3 p-4">
      <p class="field-hint">Paste a public link to a resume JSON (e.g. a GitHub raw URL).</p>
      <mat-form-field class="form-field-full" appearance="outline">
        <mat-label>Resume JSON URL</mat-label>
        <input
          matInput
          [ngModel]="urlInput()"
          (ngModelChange)="urlInput.set($event)"
          placeholder="https://raw.githubusercontent.com/user/repo/main/resume.json"
        />
      </mat-form-field>
      <div class="form-actions">
        <button matButton="filled" (click)="importUrl()" [disabled]="busy()">
          <mat-icon>cloud_download</mat-icon> Import
        </button>
      </div>
    </div>
  </mat-tab>

  <mat-tab label="Paste text">
    <div class="flex flex-col gap-3 p-4">
      <p class="field-hint">Paste raw resume text — Gemini converts it into structured JSON.</p>
      <mat-form-field class="form-field-full" appearance="outline">
        <mat-label>Resume text</mat-label>
        <textarea
          matInput
          rows="8"
          [ngModel]="textInput()"
          (ngModelChange)="textInput.set($event)"
        ></textarea>
      </mat-form-field>
      <div class="form-actions">
        <button matButton="filled" (click)="importText()" [disabled]="busy()">
          <mat-icon>auto_fix_high</mat-icon> Convert with Gemini
        </button>
      </div>
    </div>
  </mat-tab>
</mat-tab-group>

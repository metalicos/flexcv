@if (busy()) {
  <mat-progress-bar mode="indeterminate" />
}

<mat-tab-group>
  <mat-tab [label]="i18n.t('import.tab.file')">
    <div class="flex flex-col gap-3 p-4">
      <p class="field-hint">{{ i18n.t('import.file.hint') }}</p>
      <div class="form-actions">
        <button matButton="filled" (click)="fileInput.click()" [disabled]="busy()">
          <mat-icon>upload_file</mat-icon> {{ i18n.t('import.choose') }}
        </button>
        <button matButton (click)="loadSample()" [disabled]="busy()">
          <mat-icon>auto_awesome</mat-icon> {{ i18n.t('import.loadSample') }}
        </button>
      </div>
      <input
        #fileInput
        type="file"
        class="hidden"
        [accept]="accept"
        (change)="onFileSelected($event)"
      />
    </div>
  </mat-tab>

  <mat-tab [label]="i18n.t('import.tab.url')">
    <div class="flex flex-col gap-3 p-4">
      <p class="field-hint">{{ i18n.t('import.url.hint') }}</p>
      <mat-form-field class="form-field-full" appearance="outline">
        <mat-label>{{ i18n.t('import.url.label') }}</mat-label>
        <input
          matInput
          [ngModel]="urlInput()"
          (ngModelChange)="urlInput.set($event)"
          placeholder="https://raw.githubusercontent.com/user/repo/main/resume.json"
        />
      </mat-form-field>
      <div class="form-actions">
        <button matButton="filled" (click)="importUrl()" [disabled]="busy()">
          <mat-icon>cloud_download</mat-icon> {{ i18n.t('import.url.button') }}
        </button>
      </div>
    </div>
  </mat-tab>

  <mat-tab [label]="i18n.t('import.tab.text')">
    <div class="flex flex-col gap-3 p-4">
      <p class="field-hint">{{ i18n.t('import.text.hint') }}</p>
      <mat-form-field class="form-field-full" appearance="outline">
        <mat-label>{{ i18n.t('import.text.label') }}</mat-label>
        <textarea
          matInput
          rows="8"
          [ngModel]="textInput()"
          (ngModelChange)="textInput.set($event)"
        ></textarea>
      </mat-form-field>
      <div class="form-actions">
        <button matButton="filled" (click)="importText()" [disabled]="busy()">
          <mat-icon>auto_fix_high</mat-icon> {{ i18n.t('import.text.button') }}
        </button>
      </div>
    </div>
  </mat-tab>
</mat-tab-group>
